apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: tikto-gateway-smoke-test
  namespace: tikto-prod
spec:
  metrics:
  - name: run-smoke-test
    failureLimit: 0
    provider:
      job:
        spec:
          ttlSecondsAfterFinished: 60
          backoffLimit: 0
          template:
            metadata:
              annotations:
                sidecar.istio.io/inject: "false"
            spec:
              containers:
              - name: traffic-generator
                image: curlimages/curl:latest
                command: 
                - sh
                - -c
                - |
                  echo "╔══════════════════════════════════════════════════╗"
                  echo "║   🚀 CANARY SMOKE TEST — tikto-gateway          ║"
                  echo "╚══════════════════════════════════════════════════╝"
                  echo ""

                  echo "📋 Phase 1/3: Waiting for Gateway Canary service..."
                  echo "   Target: http://tikto-gateway-canary:4000/health"
                  echo "   Timeout: 300s (150 attempts × 2s)"
                  echo ""
                  READY=0
                  for attempt in $(seq 1 150); do
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 http://tikto-gateway-canary:4000/health 2>/dev/null || echo "000")
                    if [ "$STATUS" = "200" ]; then
                      echo "   ✅ Gateway Canary is READY (HTTP $STATUS) after $attempt attempt(s)"
                      READY=1
                      break
                    fi
                    echo "   ⏳ [$attempt/150] Not ready yet (HTTP $STATUS), retrying in 2s..."
                    sleep 2
                  done

                  if [ "$READY" = "0" ]; then
                    echo ""
                    echo "   ❌ TIMEOUT: Gateway Canary never became ready after 300 seconds!"
                    exit 1
                  fi

                  echo ""
                  echo "📋 Phase 2/3: Sending 200 health check requests..."
                  echo "   ────────────────────────────────────────────"
                  PASS=0
                  FAIL=0
                  for i in $(seq 1 200); do
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 1 http://tikto-gateway-canary:4000/health)
                    if [ "$STATUS" = "200" ]; then
                      PASS=$((PASS + 1))
                    else
                      FAIL=$((FAIL + 1))
                      echo "   ❌ Request #$i FAILED (HTTP $STATUS)"
                    fi
                    if [ $((i % 50)) -eq 0 ]; then
                      echo "   📊 Progress: $i/200 sent | ✅ $PASS passed | ❌ $FAIL failed"
                    fi
                    sleep 0.1
                  done

                  echo ""
                  echo "📋 Phase 3/3: Results Summary"
                  echo "   ════════════════════════════════════════════"
                  echo "   Total Requests : 200"
                  echo "   ✅ Passed       : $PASS"
                  echo "   ❌ Failed       : $FAIL"
                  echo "   Success Rate   : $((PASS * 100 / 200))%"
                  echo "   ════════════════════════════════════════════"

                  if [ "$FAIL" -gt 0 ]; then
                    echo ""
                    echo "   🔴 VERDICT: GATEWAY SMOKE TEST FAILED ($FAIL errors detected)"
                    exit 1
                  fi

                  echo ""
                  echo "   🟢 VERDICT: GATEWAY SMOKE TEST PASSED (200/200 healthy)"
              restartPolicy: Never
