apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tikto-prod

resources:
  - ../../base
  - namespace.yaml
  - configmap.yaml
  - pdb.yaml

patches:
  - path: patch-image.yaml
  - path: patch-replicas.yaml
  - path: patch-scheduling.yaml
  - path: patch-service.yaml

commonLabels:
  app.kubernetes.io/instance: tikto-prod
  app.kubernetes.io/environment: prod
