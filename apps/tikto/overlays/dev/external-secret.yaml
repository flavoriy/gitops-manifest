apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tikto-secret
  namespace: tikto-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: tikto-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: tikto/secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-secret
  namespace: tikto-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: ghcr-secret
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username | toString }}",
                "password": "{{ .token | toString }}"
              }
            }
          }
  data:
    - secretKey: token
      remoteRef:
        key: tikto/secrets
        property: GITOPS_TOKEN
    - secretKey: username
      remoteRef:
        key: tikto/secrets
        property: GITOPS_USERNAME
