apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tikto-gateway
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: tikto
      app.kubernetes.io/component: gateway
      app.kubernetes.io/environment: prod
      app.kubernetes.io/instance: tikto-prod
  strategy:
    canary:
      stableService: tikto-gateway-stable
      canaryService: tikto-gateway-canary
      trafficRouting:
        istio:
          virtualService:
            name: tikto-gateway-vs
            routes:
              - primary
      analysis:
        templates:
          - templateName: tikto-gateway-smoke-test
          - templateName: opensearch-error-check
        args:
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
      steps:
        - setWeight: 10
        - pause: { duration: 1m }
        - setWeight: 50
        - pause: { duration: 1m }
        - setWeight: 80
        - pause: { duration: 1m }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tikto
        app.kubernetes.io/component: gateway
        app.kubernetes.io/environment: prod
        app.kubernetes.io/instance: tikto-prod
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: gateway
          image: ghcr.io/flavoriy/tikto-gateway:bootstrap
          imagePullPolicy: IfNotPresent
          command:
            - npm
            - run
            - service:gateway:start
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: PORT
              value: "4000"
          envFrom:
            - secretRef:
                name: tikto-secret
            - configMapRef:
                name: tikto-config
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
