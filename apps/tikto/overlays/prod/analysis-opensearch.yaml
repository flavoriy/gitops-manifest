apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: opensearch-error-check
  namespace: tikto-prod
spec:
  args:
    - name: canary-hash
  metrics:
  - name: check-canary-errors
    failureLimit: 1
    provider:
      job:
        spec:
          backoffLimit: 0
          template:
            metadata:
              annotations:
                sidecar.istio.io/inject: "false"
            spec:
              containers:
              - name: opensearch-checker
                image: curlimages/curl:latest
                env:
                  - name: CANARY_HASH
                    value: "{{args.canary-hash}}"
                command:
                - sh
                - -c
                - |
                  TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  OS_URL="https://vpc-tikto-prod-logs-bh7mmmai6lxjvrgtp7c7hl3iwm.ap-southeast-1.es.amazonaws.com"
                  INDEX="kubernetes-logs"
                  THRESHOLD=5
                  
                  echo "[STEP] OpenSearch Error Check | canary-hash=$CANARY_HASH | started=$TIMESTAMP"
                  echo "[INFO] target=$OS_URL/$INDEX window=2m threshold=$THRESHOLD"
                  
                  # ── Build & send query ──────────────────────────
                  QUERY=$(cat <<EOF
                  {
                    "size": 5,
                    "query": {
                      "bool": {
                        "must": [
                          { "match": { "kubernetes.labels.rollouts-pod-template-hash": "$CANARY_HASH" } },
                          { "match": { "log": "error failed exception" } },
                          { "range": { "@timestamp": { "gte": "now-2m" } } }
                        ]
                      }
                    },
                    "sort": [{ "@timestamp": "desc" }]
                  }
                  EOF
                  )
                  
                  echo "[STEP] Querying OpenSearch..."
                  
                  RESPONSE=$(curl -s -w "\n%{http_code}|%{time_total}" \
                    -X POST "$OS_URL/$INDEX/_search" \
                    -H "Content-Type: application/json" \
                    -d "$QUERY" 2>&1)
                  
                  HTTP_LINE=$(echo "$RESPONSE" | tail -n 1)
                  HTTP_CODE=$(echo "$HTTP_LINE" | cut -d'|' -f1)
                  LATENCY=$(echo "$HTTP_LINE" | cut -d'|' -f2)
                  BODY=$(echo "$RESPONSE" | sed '$d')
                  
                  echo "[INFO] http_code=$HTTP_CODE latency=${LATENCY}s"
                  
                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "[INFO] response_body_preview=$(echo "$BODY" | head -c 300 | tr '\n' ' ')"
                    echo "[RESULT] ERROR | opensearch unreachable, http_code=$HTTP_CODE"
                    exit 1
                  fi
                  
                  # ── Parse results ──────────────────────────
                  ERROR_COUNT=$(echo "$BODY" | grep -o '"total":{"value":[0-9]*' | head -1 | grep -o '[0-9]*$' || echo "0")
                  TOOK=$(echo "$BODY" | grep -o '"took":[0-9]*' | head -1 | grep -o '[0-9]*' || echo "?")
                  
                  echo "[STEP] Analysis complete | took=${TOOK}ms errors_found=$ERROR_COUNT threshold=$THRESHOLD"
                  
                  if [ "$ERROR_COUNT" -gt 0 ]; then
                    echo "[INFO] sample_errors:"
                    echo "$BODY" | grep -o '"log":"[^"]*"' | head -5 | while IFS= read -r line; do
                      echo "[INFO]   $line"
                    done
                  fi
                  
                  if [ "$ERROR_COUNT" -ge "$THRESHOLD" ]; then
                    echo "[RESULT] FAILED | errors=$ERROR_COUNT threshold=$THRESHOLD"
                    exit 1
                  fi
                  
                  echo "[RESULT] PASSED | errors=$ERROR_COUNT threshold=$THRESHOLD"
              restartPolicy: Never
