apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: tikto-smoke-test-template
  namespace: tikto-prod
spec:
  metrics:
  - name: run-smoke-test
    failureLimit: 0
    provider:
      job:
        spec:
          ttlSecondsAfterFinished: 60
          backoffLimit: 0
          template:
            spec:
              containers:
              - name: traffic-generator
                image: curlimages/curl:latest
                command: 
                - sh
                - -c
                - |
                  echo "🚀 Starting automated smoke tests against Canary..."
                  echo "⏳ Waiting for Canary service to be ready (max 300s)..."
                  for attempt in $(seq 1 150); do
                    if curl -s -f --connect-timeout 2 http://tikto-canary:80/api/health > /dev/null; then
                      echo "💚 Canary service is ready!"
                      break
                    fi
                    echo "...Canary service not ready yet, retrying in 2 seconds (attempt $attempt/150)..."
                    sleep 2
                  done

                  for i in $(seq 1 200); do
                    curl -s -f --retry 3 --retry-delay 1 http://tikto-canary:80/api/health || {
                      echo "❌ Smoke test FAILED at request #$i! Canary API returned an error."
                      exit 1
                    }
                    sleep 0.1
                  done
                  echo "✅ Smoke test PASSED successfully with 200 requests!"
              restartPolicy: Never
