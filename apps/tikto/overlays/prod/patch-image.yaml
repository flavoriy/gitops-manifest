apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tikto
spec:
  template:
    spec:
      containers:
        - name: tikto
          image: ghcr.io/flavoriy/tikto-web:v2.0.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: tikto-secret
            - configMapRef:
                name: tikto-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-profile-api
spec:
  template:
    spec:
      containers:
        - name: profile-api
          image: ghcr.io/flavoriy/tikto-profile:v2.0.10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-tasks-api
spec:
  template:
    spec:
      containers:
        - name: tasks-api
          image: ghcr.io/flavoriy/tikto-tasks:v2.0.10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-calendar-api
spec:
  template:
    spec:
      containers:
        - name: calendar-api
          image: ghcr.io/flavoriy/tikto-calendar:v2.0.10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-dashboard-api
spec:
  template:
    spec:
      containers:
        - name: dashboard-api
          image: ghcr.io/flavoriy/tikto-dashboard:v2.0.10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          image: ghcr.io/flavoriy/tikto-gateway:v2.0.10