apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tikto-secret
  namespace: tikto-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: tikto-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: tikto/dev
