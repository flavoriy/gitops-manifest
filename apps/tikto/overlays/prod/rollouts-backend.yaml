apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tikto-profile-api
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: tikto
      app.kubernetes.io/component: profile-api
  strategy:
    canary:
      stableService: tikto-profile-api-stable
      canaryService: tikto-profile-api-canary
      trafficRouting:
        istio:
          virtualService:
            name: tikto-profile-api-vs
            routes:
              - primary
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 80
        - pause: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tikto
        app.kubernetes.io/component: profile-api
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: profile-api
          image: ghcr.io/flavoriy/tikto:bootstrap
          imagePullPolicy: IfNotPresent
          command:
            - npm
            - run
            - service:profile:start
          ports:
            - name: http
              containerPort: 4100
          env:
            - name: PORT
              value: "4100"
          envFrom:
            - secretRef:
                name: tikto-secret
            - configMapRef:
                name: tikto-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 160Mi
            limits:
              cpu: 300m
              memory: 320Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
