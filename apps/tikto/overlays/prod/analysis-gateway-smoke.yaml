apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: tikto-gateway-smoke-test
  namespace: tikto-prod
spec:
  metrics:
  - name: run-smoke-test
    failureLimit: 0
    provider:
      job:
        spec:
          backoffLimit: 0
          template:
            metadata:
              annotations:
                sidecar.istio.io/inject: "false"
            spec:
              containers:
              - name: traffic-generator
                image: curlimages/curl:latest
                command: 
                - sh
                - -c
                - |
                  START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  echo "╔══════════════════════════════════════════════════════════╗"
                  echo "║        🚀 CANARY SMOKE TEST — tikto-gateway             ║"
                  echo "╠══════════════════════════════════════════════════════════╣"
                  echo "║  Started at : $START_TIME"
                  echo "║  Target     : http://tikto-gateway-canary:4000/health"
                  echo "║  Requests   : 200"
                  echo "║  Timeout    : 300s"
                  echo "╚══════════════════════════════════════════════════════════╝"
                  echo ""

                  # ── Phase 1: Wait for readiness ──────────────────────────
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "📋 Phase 1/3: Waiting for Gateway Canary to become healthy..."
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  READY=0
                  for attempt in $(seq 1 150); do
                    TIMESTAMP=$(date -u +"%H:%M:%S")
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 http://tikto-gateway-canary:4000/health 2>/dev/null || echo "000")
                    if [ "$STATUS" = "200" ]; then
                      echo "[$TIMESTAMP] ✅ Gateway Canary is READY (HTTP $STATUS) — took $attempt attempt(s)"
                      READY=1
                      break
                    fi
                    echo "[$TIMESTAMP] ⏳ Attempt $attempt/150 — HTTP $STATUS — retrying in 2s..."
                    sleep 2
                  done

                  if [ "$READY" = "0" ]; then
                    echo ""
                    echo "[$TIMESTAMP] ❌ TIMEOUT: Gateway Canary never became healthy after 300 seconds!"
                    echo "[$TIMESTAMP] 🔴 RESULT: FAILED"
                    exit 1
                  fi

                  echo ""

                  # ── Phase 2: Send traffic ────────────────────────────────
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "📋 Phase 2/3: Sending 200 health-check requests..."
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  PASS=0
                  FAIL=0
                  for i in $(seq 1 200); do
                    TIMESTAMP=$(date -u +"%H:%M:%S")
                    RESP=$(curl -s -w "\n%{http_code}|%{time_total}" --retry 3 --retry-delay 1 http://tikto-gateway-canary:4000/health)
                    HTTP_CODE=$(echo "$RESP" | tail -1 | cut -d'|' -f1)
                    LATENCY=$(echo "$RESP" | tail -1 | cut -d'|' -f2)

                    if [ "$HTTP_CODE" = "200" ]; then
                      PASS=$((PASS + 1))
                    else
                      FAIL=$((FAIL + 1))
                      echo "[$TIMESTAMP] ❌ #$i FAILED — HTTP $HTTP_CODE — ${LATENCY}s"
                    fi

                    if [ $((i % 50)) -eq 0 ]; then
                      echo "[$TIMESTAMP] 📊 Progress: $i/200 | ✅ $PASS passed | ❌ $FAIL failed"
                    fi
                    sleep 0.1
                  done

                  echo ""

                  # ── Phase 3: Summary ─────────────────────────────────────
                  END_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "📋 Phase 3/3: Final Report"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "   Start        : $START_TIME"
                  echo "   End          : $END_TIME"
                  echo "   Total Sent   : 200"
                  echo "   ✅ Passed     : $PASS"
                  echo "   ❌ Failed     : $FAIL"
                  echo "   Success Rate : $((PASS * 100 / 200))%"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

                  if [ "$FAIL" -gt 0 ]; then
                    echo "🔴 VERDICT: GATEWAY SMOKE TEST FAILED — $FAIL request(s) returned errors"
                    exit 1
                  fi

                  echo "🟢 VERDICT: GATEWAY SMOKE TEST PASSED — 200/200 requests healthy"
              restartPolicy: Never
