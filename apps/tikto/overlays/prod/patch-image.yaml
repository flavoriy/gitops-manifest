apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tikto
spec:
  template:
    spec:
      containers:
        - name: tikto
          image: ghcr.io/flavoriy/tikto-web:bootstrap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-profile-api
spec:
  template:
    spec:
      containers:
        - name: profile-api
          image: ghcr.io/flavoriy/tikto-profile:bootstrap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-tasks-api
spec:
  template:
    spec:
      containers:
        - name: tasks-api
          image: ghcr.io/flavoriy/tikto-tasks:bootstrap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-calendar-api
spec:
  template:
    spec:
      containers:
        - name: calendar-api
          image: ghcr.io/flavoriy/tikto-calendar:bootstrap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikto-dashboard-api
spec:
  template:
    spec:
      containers:
        - name: dashboard-api
          image: ghcr.io/flavoriy/tikto-dashboard:bootstrap