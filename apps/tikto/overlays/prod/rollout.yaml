apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tikto
spec:
  strategy:
    canary:
      stableService: tikto-stable
      canaryService: tikto-canary
      trafficRouting:
        istio:
          virtualService:
            name: tikto-virtual-service
            routes:
              - primary
      analysis:
        templates:
          - templateName: tikto-smoke-test-template
          - templateName: opensearch-error-check
        args:
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 80
        - pause: {} # Infinite pause: waits for manual promote to 100%
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: tikto
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: tikto-prod
      app.kubernetes.io/environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tikto
        app.kubernetes.io/component: web
        app.kubernetes.io/instance: tikto-prod
        app.kubernetes.io/environment: prod
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: tikto
          image: ghcr.io/flavoriy/tikto-web:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: tikto-secret
            - configMapRef:
                name: tikto-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
