apiVersion: v1
kind: Secret
metadata:
  name: tikto-secret
  namespace: tikto-prod
type: Opaque
stringData:
  DATABASE_URL: postgresql://user:password@host:5432/database
  TIKTO_INTERNAL_API_KEY: replace-with-shared-internal-api-key
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: replace-with-prod-publishable-key