apiVersion: v1
kind: Service
metadata:
  name: tikto
  annotations:
    link.argoproj.io/external-link: http://10.0.1.12:30443
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30443
---
apiVersion: v1
kind: Service
metadata:
  name: tikto-gateway
spec:
  type: NodePort
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30080
