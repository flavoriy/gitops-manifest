apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tikto-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Flavoriy/gitops-manifest.git
    targetRevision: main
    path: apps/tikto/overlays/prod
  destination:
    name: eks-prod
    namespace: tikto-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
  ignoreDifferences:
    - group: networking.k8s.io
      kind: Ingress
      name: tikto-ingress
      jsonPointers:
        - /metadata/annotations/alb.ingress.kubernetes.io~1actions.tikto
